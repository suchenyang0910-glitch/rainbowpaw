services:
  postgres:
    image: postgres:16-alpine
    container_name: rainbowpaw_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rainbowpaw}
      POSTGRES_USER: ${POSTGRES_USER:-rainbowpaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rainbowpaw}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: rainbowpaw_redis
    ports:
      - "6380:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
  redisdata:
