services:
  caddy:
    image: caddy:2.10-alpine
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      web:
        condition: service_started
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
