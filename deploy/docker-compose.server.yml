services:
  postgres:
    image: postgres:16-alpine
    container_name: rainbowpaw_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rainbowpaw}
      POSTGRES_USER: ${POSTGRES_USER:-rainbowpaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rainbowpaw}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ../database/ops_admin.sql:/docker-entrypoint-initdb.d/02-ops-admin.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: rainbowpaw_redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  identity-service:
    build:
      context: ..
      dockerfile: services/identity-service/Dockerfile
    environment:
      PORT: 3001
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-rainbowpaw}
      POSTGRES_USER: ${POSTGRES_USER:-rainbowpaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rainbowpaw}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  wallet-service:
    build:
      context: ..
      dockerfile: services/wallet-service/Dockerfile
    environment:
      PORT: 3002
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-rainbowpaw}
      POSTGRES_USER: ${POSTGRES_USER:-rainbowpaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rainbowpaw}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  bridge-service:
    build:
      context: ..
      dockerfile: services/bridge-service/Dockerfile
    environment:
      PORT: 3003
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-rainbowpaw}
      POSTGRES_USER: ${POSTGRES_USER:-rainbowpaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rainbowpaw}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ai-orchestrator:
    build:
      context: ..
      dockerfile: services/ai-orchestrator/Dockerfile
    environment:
      NODE_OPTIONS: ${NODE_OPTIONS:---dns-result-order=ipv4first}
      PORT: 3005
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      AI_ENABLE_DB: "false"
      AI_MOCK_MODE: ${AI_MOCK_MODE:-false}
      AI_BASE_URL: ${AI_BASE_URL}
      AI_API_KEY: ${AI_API_KEY}
      AI_MODEL: ${AI_MODEL}
      AI_CHAT_COMPLETIONS_PATH: ${AI_CHAT_COMPLETIONS_PATH:-/v1/chat/completions}
      AI_EMBEDDINGS_PATH: ${AI_EMBEDDINGS_PATH:-/v1/embeddings}
      AI_RERANK_PATH: ${AI_RERANK_PATH:-/v1/ranking}
      AI_PII_PATH: ${AI_PII_PATH:-/v1/extract}
      AI_RERANK_TOP_N: ${AI_RERANK_TOP_N:-20}
      AI_RECOMMEND_TOPK: ${AI_RECOMMEND_TOPK:-20}
      AI_EMBED_BATCH_SIZE: ${AI_EMBED_BATCH_SIZE:-32}
      AI_ENABLE_PII_REDACTION: ${AI_ENABLE_PII_REDACTION:-true}
      AI_MODEL_SUPPORT_AI: ${AI_MODEL_SUPPORT_AI}
      AI_MODEL_GROWTH_AI: ${AI_MODEL_GROWTH_AI}
      AI_MODEL_PRODUCT_AI: ${AI_MODEL_PRODUCT_AI}
      AI_MODEL_OPS_AI: ${AI_MODEL_OPS_AI}
      AI_MODEL_RISK_AI: ${AI_MODEL_RISK_AI}
      AI_MODEL_RECOMMEND_AI: ${AI_MODEL_RECOMMEND_AI}
      AI_EMBED_MODEL: ${AI_EMBED_MODEL}
      AI_RERANK_MODEL: ${AI_RERANK_MODEL}
      AI_PII_MODEL: ${AI_PII_MODEL}
      AI_VL_MODEL: ${AI_VL_MODEL}
      AI_VOICE_MODEL: ${AI_VOICE_MODEL}
      AI_HTTP_TIMEOUT_MS: ${AI_HTTP_TIMEOUT_MS:-60000}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-800}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.2}
      AI_DAILY_BUDGET_USD: ${AI_DAILY_BUDGET_USD}
      AI_PRICE_INPUT_PER_1K: ${AI_PRICE_INPUT_PER_1K}
      AI_PRICE_OUTPUT_PER_1K: ${AI_PRICE_OUTPUT_PER_1K}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  api-gateway:
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    environment:
      PORT: 3012
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      RAINBOW_BOT_TOKEN: ${RAINBOW_BOT_TOKEN}
      CLAW_BOT_TOKEN: ${CLAW_BOT_TOKEN}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS:-}
      PUBLIC_WEB_BASE_URL: ${PUBLIC_WEB_BASE_URL:-}
      SUPPORT_LINK: ${SUPPORT_LINK:-https://t.me/RainbowPawbot}
      SETTLECORE_BASE_URL: ${SETTLECORE_BASE_URL:-https://api.settlecore.org}
      RAINBOWPAW_API_KEY: ${RAINBOWPAW_API_KEY:-}
      RAINBOWPAW_WEBHOOK_SECRET: ${RAINBOWPAW_WEBHOOK_SECRET:-}
      ABA_NAME: ${ABA_NAME:-}
      ABA_ID: ${ABA_ID:-}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-rainbowpaw}
      POSTGRES_USER: ${POSTGRES_USER:-rainbowpaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rainbowpaw}
      IDENTITY_SERVICE_URL: http://identity-service:3001/api
      WALLET_SERVICE_URL: http://wallet-service:3002/api
      BRIDGE_SERVICE_URL: http://bridge-service:3003/api
      AI_ORCHESTRATOR_SERVICE_URL: http://ai-orchestrator:3005/api
      ENABLE_AI_RECOMMEND_ON_PLAY: ${ENABLE_AI_RECOMMEND_ON_PLAY:-false}
    depends_on:
      identity-service:
        condition: service_started
      wallet-service:
        condition: service_started
      bridge-service:
        condition: service_started
      ai-orchestrator:
        condition: service_started
    restart: unless-stopped

  bots:
    build:
      context: ..
      dockerfile: bots/Dockerfile
    environment:
      CLAW_BOT_TOKEN: ${CLAW_BOT_TOKEN}
      RAINBOW_BOT_TOKEN: ${RAINBOW_BOT_TOKEN}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      ENABLE_SUPPORT_AI: ${ENABLE_SUPPORT_AI:-false}
      PUBLIC_WEB_BASE_URL: ${PUBLIC_WEB_BASE_URL:-}
      SUPPORT_LINK: ${SUPPORT_LINK:-https://t.me/RainbowPawbot}
      IDENTITY_SERVICE_URL: http://identity-service:3001/api
      WALLET_SERVICE_URL: http://wallet-service:3002/api
      BRIDGE_SERVICE_URL: http://bridge-service:3003/api
      AI_ORCHESTRATOR_SERVICE_URL: http://ai-orchestrator:3005/api
      REPORT_SERVICE_URL: ${REPORT_SERVICE_URL:-http://localhost:3004/api}
      API_GATEWAY_URL: http://api-gateway:3012/api
      AI_ALERT_MIN_REQUESTS: ${AI_ALERT_MIN_REQUESTS:-20}
      AI_ALERT_ERROR_RATE: ${AI_ALERT_ERROR_RATE:-0.2}
      AI_ALERT_FALLBACK_RATE: ${AI_ALERT_FALLBACK_RATE:-0.3}
      AI_ALERT_INTERVAL_MS: ${AI_ALERT_INTERVAL_MS:-300000}
    depends_on:
      api-gateway:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: web-app/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_SUPPORT_LINK: ${VITE_SUPPORT_LINK:-https://t.me/RainbowPawbot}
        VITE_DEV_TELEGRAM_ID: ${VITE_DEV_TELEGRAM_ID:-}
        VITE_MOCK_INIT_DATA: ${VITE_MOCK_INIT_DATA:-}
    depends_on:
      api-gateway:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
